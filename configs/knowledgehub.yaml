schema_version: 1
base_rag_config: rag/default.yaml
knowledge_bases:
  literature:
    data_dir: /data/KnowledgeHub/rag/zotero
    collection: zotero_papers_qwen3_4b_1024_v2
    query_instruction: Given a research question, retrieve relevant passages from academic papers that answer the question.
  code:
    data_dir: /data/KnowledgeHub/rag/code
    collection: knowledgehub_code_qwen3_4b_1024_v1
    query_instruction: Given a software engineering question, retrieve versioned official documentation, examples, source code and release evidence.
  writing:
    data_dir: /data/KnowledgeHub/rag/writing
    collection: knowledgehub_writing_qwen3_4b_1024_v1
    query_instruction: Given an academic writing need, retrieve transferable rhetorical patterns and usage guidance.
code:
  data_root: /data/KnowledgeHub/code
  registry: sources/code.yaml
  github_token_env: GITHUB_TOKEN
  timeout_seconds: 60
  max_retries: 3
writing:
  data_root: /data/KnowledgeHub/writing
  literature_data_dir: /data/KnowledgeHub/rag/zotero
  analyzer: rules
  processor_version: rules-v2
  default_limit: 5
  minimum_quality: 0.45
