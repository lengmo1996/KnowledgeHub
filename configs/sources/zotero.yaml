# Example explicit Zotero source configuration. Do not put API keys in this
# repository; provide ZOTERO_API_KEY through the process environment.
api_base_url: https://api.zotero.org
library_type: user
# Required for group libraries. May be null for a user library.
library_id: null

# Nutstore paginates large PROPFIND listings with Link: rel="next". The
# refresh-cache command follows every page; credentials stay in the environment.
webdav_url: https://dav.jianguoyun.com/dav/zotero/
webdav_page_limit: 10000
# Nutstore enforces both burst and sustained quotas. Keep request starts slow,
# and cool down for 15 minutes after 429/503 before retrying.
webdav_request_interval_seconds: 2.0
webdav_retry_cooldown_seconds: 900
webdav_max_retry_delay_seconds: 1800
# This mirror was seeded out-of-band from the same WebDAV object set. Adopt
# unindexed regular files only when their advertised remote size matches.
webdav_adopt_existing: true
# Preserve Windows-seeded objects even when the current remote listing does
# not contain them. Attachment resolution may still consume those local files.
webdav_prune: false
# Local disposable mirror written only by refresh-cache. Attachment resolution
# opens it read-only after the refresh command exits.
webdav_dir: /data/KnowledgeHub/zotero_cache
# SQLite, extracted PDFs, manifests, runs, and logs are written only here.
data_dir: /data/KnowledgeHub/zotero

http_timeout_seconds: 30
max_retries: 5
sync_max_retries: 3
api_concurrency: 2

zip_stability_interval_seconds: 10
zip_stability_check_count: 2
mapping_validation_sample_size: 20
# On a metadata 304, retry unresolved attachments and archives whose stat data
# changed. `resolve-attachments` always performs an explicit local rescan.
attachment_scan_on_304: true
# Metadata-only changes do not require rechunking unless this is enabled.
metadata_changes_require_chunking: false

# Streaming is not implemented in v1. Poll with systemd or `watch` instead.
enable_streaming: false
poll_interval_seconds: 300
log_level: INFO
