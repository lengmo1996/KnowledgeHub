rag:
  source: zotero
  source_snapshot_path: /data/KnowledgeHub/zotero/manifests/documents.jsonl
  source_delta_catalog_path: /data/KnowledgeHub/zotero/manifests/delta-catalog.jsonl
  data_dir: /data/KnowledgeHub/rag/zotero
  qdrant_url: http://127.0.0.1:6333
  qdrant_collection: zotero_papers_qwen3_4b_1024_v2
  qdrant_smoke_collection: zotero_papers_qwen3_4b_1024_smoke
  model_cache_dir: /data/KnowledgeHub/model-cache
  gpu_mode: auto
  gpu_ids: [0, 1]
  parse_device: cuda
  parse_gpu_ids: [0, 1]
  parse_workers_per_gpu: 1
  parse_cpu_threads_per_worker: 8
  parser_name: docling
  parser_fallback: pymupdf
  ocr_enabled: false
  chunk_max_tokens: 768
  chunk_merge_peers: true
  embedding_model: Qwen/Qwen3-Embedding-4B
  embedding_revision: 5cf2132abc99cad020ac570b19d031efec650f2b
  embedding_dtype: float16
  embedding_dim: 1024
  embedding_normalize: true
  embedding_max_length: 8192
  embedding_batch_size: 16
  embedding_max_batch_tokens: 8192
  embedding_query_instruction: Given a research question, retrieve relevant passages from academic papers that answer the question.
  embedding_endpoints:
    - http://127.0.0.1:8080
    - http://127.0.0.1:8082
  embedding_request_strategy: least_outstanding
  embedding_timeout_seconds: 120
  reranker_profile: "off"
  reranker_url: http://127.0.0.1:8081
  reranker_gpu_id: 1
  reranker_max_length: 2048
  reranker_batch_size: 4
  sparse_model: Qdrant/bm25
  cuda_allow_tf32: true
  gpu_memory_safety_margin_mb: 2048
  log_level: INFO
