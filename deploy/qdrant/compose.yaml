name: knowledgehub-rag

services:
  qdrant:
    image: qdrant/qdrant:v1.18.2
    profiles: [core, online-dual]
    # Qdrant is the low-VRAM persistent core and is safe to recover at boot.
    restart: unless-stopped
    ports:
      - "127.0.0.1:${KH_QDRANT_HTTP_PORT:-6333}:6333"
      - "127.0.0.1:${KH_QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - "${KH_QDRANT_STORAGE:-/data/KnowledgeHub/qdrant}:/qdrant/storage"
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 3s
      retries: 12
    security_opt:
      - no-new-privileges:true
